<!DOCTYPE html>
<html>
<head>
<title>Textfields and Image</title>

<style>

input{
    border:3px solid blue;
    margin-left:10px;
    margin-right:10px;
}

img{
    border:3px solid red;
    border-radius:20px;
    margin-top:30px;
}

</style>

</head>

<body>

<input type="text" placeholder="First Name">
<input type="text" placeholder="Last Name">
<input type="text" placeholder="City">

<br>

<img src="smile.png" width="200" height="150">

</body>
</html>
